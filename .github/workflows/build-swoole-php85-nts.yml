name: Build Swoole DLL for PHP 8.5 NTS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "swoole-php85-nts-*"
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  build:
    name: Build php_swoole.dll
    runs-on: windows-2022
    env:
      TOOLS_PATH: C:\tools\phpdev
      PHP_VERSION: "8.5"
      PHP_TS: "nts"
      PHP_ARCH: "x64"
      SWOOLE_REF: "win32-event"
      DEPS_LIST: "openssl,libcurl,libssh2,zlib,nghttp2,libzstd,brotli"

    steps:
      - name: Clone Swoole win32-event source
        shell: pwsh
        run: |
          git clone --depth 1 --branch $env:SWOOLE_REF https://github.com/swoole/swoole-src.git swoole-src
          if (-not (Test-Path ".\swoole-src\config.w32")) {
            throw "config.w32 not found in swoole-src after clone"
          }

      - name: Apply PHP 8.5 compatibility patches
        shell: pwsh
        working-directory: .\swoole-src
        run: |
          $config = Get-Content .\config.w32 -Raw
          if ($config -notmatch '/std:c\+\+20') {
            $config = $config -replace 'ADD_FLAG\("CFLAGS_SWOOLE", "/D SW_USE_POLL=1"\);', "ADD_FLAG(`"CFLAGS_SWOOLE`", `"/D SW_USE_POLL=1`");`r`n`tADD_FLAG(`"CFLAGS_SWOOLE`", `"/std:c++20`");"
            Set-Content .\config.w32 $config -Encoding UTF8
          }

          $plain = Get-Content .\thirdparty\php\streams\plain_wrapper.c -Raw
          $plain = $plain -replace 'return VCWD_LSTAT\(url, &ssb->sb\);', 'return VCWD_LSTAT(url, (php_win32_ioutil_stat_t *) &ssb->sb);'
          $plain = $plain -replace 'return VCWD_STAT\(url, &ssb->sb\);', 'return VCWD_STAT(url, (php_win32_ioutil_stat_t *) &ssb->sb);'
          Set-Content .\thirdparty\php\streams\plain_wrapper.c $plain -Encoding UTF8

      - name: Setup PHP 8.5 NTS
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: curl,openssl,pdo
        env:
          phpts: nts

      - name: Cache PHP deps and devpack
        uses: actions/cache@v4
        with:
          path: |
            C:\tools\phpdev\deps
            C:\tools\phpdev\php-*-devel-*-*
          key: php85-${{ runner.os }}-nts-v1
          restore-keys: |
            php85-${{ runner.os }}-nts-
            php85-${{ runner.os }}-

      - name: Prepare php-sdk-binary-tools
        shell: cmd
        run: |
          IF NOT EXIST %TOOLS_PATH% MKDIR %TOOLS_PATH%
          IF NOT EXIST %TOOLS_PATH%\php-sdk-binary-tools (
            git clone --depth 1 https://github.com/php/php-sdk-binary-tools %TOOLS_PATH%\php-sdk-binary-tools || EXIT /B 1
          ) ELSE (
            git --git-dir=%TOOLS_PATH%\php-sdk-binary-tools\.git --work-tree=%TOOLS_PATH%\php-sdk-binary-tools pull || EXIT /B 1
          )

      - name: Download Windows deps
        shell: pwsh
        working-directory: .\swoole-src
        run: |
          $deps = $env:DEPS_LIST -split ','
          .\.github\workflows\winext\deps.ps1 `
            $deps `
            -ToolsPath $env:TOOLS_PATH `
            -PhpVer $env:PHP_VERSION `
            -PhpTs $false `
            -PhpArch $env:PHP_ARCH `
            -PhpVCVer vs17 `
            -Staging $true

      - name: Download PHP devel pack
        shell: pwsh
        working-directory: .\swoole-src
        run: |
          .\.github\workflows\winext\devpack.ps1 `
            -ToolsPath $env:TOOLS_PATH `
            -PhpVer $env:PHP_VERSION `
            -PhpTs $false `
            -PhpArch $env:PHP_ARCH `
            -PhpVCVer vs17

      - name: Build Swoole extension
        shell: cmd /c %TOOLS_PATH%\env.bat {0}
        working-directory: .\swoole-src
        env:
          UNIX_COLOR: "1"
          FIX_PICKLE: "1"
        run: |
          powershell .\.github\workflows\winext\build.ps1 ^
            -ExtPath . ^
            -ToolsPath %TOOLS_PATH% ^
            -ExtName swoole ^
            --enable-swoole-curl || EXIT /B 1

      - name: Collect artifacts
        shell: pwsh
        working-directory: .\swoole-src
        run: |
          New-Item -ItemType Directory -Force -Path ..\artifacts | Out-Null
          Copy-Item .\x64\Release\php_swoole.dll ..\artifacts\ -Force
          if (Test-Path .\x64\Release\php_swoole.pdb) {
            Copy-Item .\x64\Release\php_swoole.pdb ..\artifacts\ -Force
          }
          Get-ChildItem ..\artifacts | Select-Object Name, Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: php_swoole-php85-x64-nts
          path: artifacts/*

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/swoole-php85-nts-') }}
    steps:
      - name: Upload artifact to the release
        uses: php/php-windows-builder/release@v1
        with:
          release: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: "false"
