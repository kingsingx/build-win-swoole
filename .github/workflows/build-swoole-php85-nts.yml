name: Build Swoole DLL for PHP 8.5 NTS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "swoole-php85-nts-*"
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  build:
    name: Build php_swoole.dll
    runs-on: windows-2022
    steps:
      - name: Clone Swoole win32-event source
        shell: pwsh
        run: |
          git clone --depth 1 --branch win32-event https://github.com/swoole/swoole-src.git swoole-src
          if (-not (Test-Path ".\swoole-src\config.w32")) {
            throw "config.w32 not found in swoole-src after clone"
          }

      - name: Build Swoole extension
        uses: php/php-windows-builder/extension@v1
        with:
          php-version: "8.5"
          arch: x64
          ts: nts
          args: --enable-swoole --enable-swoole-curl
          libs: openssl,libcurl,libssh2,zlib,nghttp2,libzstd,brotli
          run-tests: "false"
          build-directory: swoole-src

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/swoole-php85-nts-') }}
    steps:
      - name: Upload artifact to the release
        uses: php/php-windows-builder/release@v1
        with:
          release: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: "false"
